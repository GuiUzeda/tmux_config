# ~/.config/tmux/tmux.conf

# =========================================================
# 🐚 CORE & SHELL
# =========================================================
set-option -g default-shell /usr/bin/fish

# =========================================================
# ⚡ KEYBINDINGS & BEHAVIOR
# =========================================================
# Change Prefix (Leader) to Ctrl+a and remove delay
set -g prefix C-a
unbind C-b
bind C-a send-prefix
set -s escape-time 0

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Split panes using | and _
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# Reload config (Leader + r)
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Open a floating scratchpad (Leader + h)
bind h display-popup -E -w 80% -h 80% "fish"

# Close pane with confirmation (Leader + x)
bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane

# Create new window/tab (Leader + c)
bind c new-window -c "#{pane_current_path}"

# =========================================================
# 🗂️ WORKSPACES (Session Management)
# =========================================================
# Create and switch to a new workspace/session (Leader + N)
bind N command-prompt -p "New Workspace Name:" "new-session -d -s '%1'; switch-client -t '%1'"

# =========================================================
# 🧠 SMART SPLITS (Neovim Navigation & Resize)
# =========================================================
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n C-h if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind-key -n M-h if-shell "$is_vim" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n M-j if-shell "$is_vim" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n M-k if-shell "$is_vim" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n M-l if-shell "$is_vim" 'send-keys M-l' 'resize-pane -R 3'

# =========================================================
# 📋 COPY MODE (Vim Style + Wayland Clipboard)
# =========================================================
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

# =========================================================
# 🪟 PANE BORDERS (Active Pane Highlight)
# =========================================================
set -g pane-border-style fg="#21242D"
set -g pane-active-border-style fg="#10B1FE",bold
set -g pane-border-lines heavy
set -g window-style fg="#636D83",bg="#21242D"
set -g window-active-style fg="#ABB2BF",bg="#282C34"
set -g pane-border-status top
set -g pane-border-format "#[align=left]#{?pane_active,#[fg=#10B1FE]#[bg=#10B1FE]#[fg=#21242D]#[bold]  #{T:pane_title}  #[bg=default]#[fg=#10B1FE],#[fg=#636D83]  #{T:pane_title}  }"

# =========================================================
# 🎨 STATUS BAR (Bluloco Colors + Symmetric Slash Layout)
# =========================================================
set -g status-style bg=default,fg="#ABB2BF"
set -g status-position top
set -g status-left-length 50
set -g status-right-length 150

# Left Side: Forward slash style (/ / /) connected
set -g status-left "#[bg=#5AB0F6]#[fg=#282C34]#[bold]   #S  #{?#{==:#{window_index},1}, #[bg=#FF5D86]#[fg=#5AB0F6],#[bg=default]#[fg=#5AB0F6]}"

# Windows: Forward slash style (/ / /) connected
set -g window-status-format "#[fg=#636D83,bg=default]  #I:#W  "
set -g window-status-current-format "#{?window_start_flag,,#[bg=#FF5D86]#[fg=#282c34]}#[bg=#FF5D86]#[fg=#282C34]#[bold]  #I:#W  #[bg=default]#[fg=#FF5D86]"
set -g window-status-separator ""

# Right Side: Forward slash style (/ / /) connected
set -g status-right "#{?client_prefix,#[fg=#ff5d86]#[bg=default]#[bg=#ff5D86]#[fg=#283C34]#[bold]  󱐋 PREFIX  #[fg=#5AB0F6]#[bg=#FF5D86],#[fg=#5AB0F6]#[bg=default]}\
		#[bg=#5AB0F6]#[fg=#282C34]#[bold]   #(grep 'cpu ' /proc/stat | awk '{u=($2+$4)*100/($2+$4+$5)} END {printf \"%.0f%%\", u}') \
		#[fg=#f0A868,bg=#5AB0F6]#[bg=#f0A868]#[fg=#282C34]#[bold]  󰍛 #(free -h | awk '/Mem:/ {print $3}' | sed 's/Gi/G/') \
		#[fg=#10B1FE,bg=#f0A868]#[bg=#10B1FE]#[fg=#282C34]#[bold]  󟀵 #(df -h / | awk '/\\// {print $4}' | tail -1) \
		#[fg=#3FC56B,bg=#10B1FE]#[bg=#3FC56B]#[fg=#282C34]#[bold]  %H:%M \
		#[fg=#8AD69E,bg=#3FC56B]#[bg=#8AD69E]#[fg=#282C34]#[bold]  %d-%b-%y  "

# =========================================================
# 💾 PLUGINS (Resurrect & Continuum)
# =========================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-save-key 'S'
set -g @resurrect-restore-key 'R'

# Manual overrides in case plugin options are slow to load
bind S run-shell /home/uzeda/.config/tmux/plugins/tmux-resurrect/scripts/save.sh
bind R run-shell /home/uzeda/.config/tmux/plugins/tmux-resurrect/scripts/restore.sh

set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'
set -g @resurrect-dir '~/.local/share/tmux/resurrect'
set -g @resurrect-capture-pane-contents 'on'

run '~/.config/tmux/plugins/tpm/tpm'
